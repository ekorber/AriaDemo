services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    env_file: .env
    volumes:
      - ./chat:/app/chat
      - ./AriaDemo:/app/AriaDemo

  frontend:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_TARGET=http://backend:8000
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
      - ./client/tailwind.config.js:/app/tailwind.config.js

volumes:
  mongo_data:
