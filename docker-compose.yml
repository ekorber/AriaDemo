services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    env_file: .env
    volumes:
      - ./chat:/app/chat
      - ./content:/app/content
      - ./AriaDemo:/app/AriaDemo
      - ./static:/app/static


volumes:
  mongo_data:
